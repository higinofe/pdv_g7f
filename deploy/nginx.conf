# Configuração do Nginx para o PDV local.
# Copiar para: /etc/nginx/sites-available/pdv
# Habilitar:   sudo ln -s /etc/nginx/sites-available/pdv /etc/nginx/sites-enabled/
# Remover o default: sudo rm /etc/nginx/sites-enabled/default
# Recarregar:  sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/pdv/public;
    index index.php;

    client_max_body_size 16M;

    # ---------- Logs ----------
    access_log /var/log/nginx/pdv.access.log;
    error_log  /var/log/nginx/pdv.error.log warn;

    # ---------- Roteamento ----------
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # PHP-FPM
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock; # ajuste conforme versão do PHP
        fastcgi_read_timeout 300;
    }

    # ---------- Segurança: bloquear acesso direto a arquivos sensíveis ----------
    location ~ /\. {
        deny all;
    }
    location ~ /(app|config|database|sync|logs|deploy)/ {
        deny all;
        return 404;
    }

    # ---------- Cache de assets estáticos ----------
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|woff2?|ttf|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
}
